<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Opening Spectra…</title>
<script>
  // Fallback for when the iOS Universal Link doesn't claim this URL (Apple's
  // AASA cache is slow during development). Bounce into the app via the custom
  // URL scheme, preserving the Meta AI callback query string verbatim.
  (function () {
    var q = window.location.search || "";
    window.location.replace("spectrademo://spectra" + q);
  })();
</script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b0d12;
    color:#e6e9f0;text-align:center;padding:56px 24px;margin:0}
  a{color:#7c8cff;font-weight:600;text-decoration:none}
</style>
</head>
<body>
  <p>Opening Spectra…</p>
  <p><a id="open" href="#">Tap here if the app doesn't open</a></p>
  <script>
    document.getElementById("open").href = "spectrademo://spectra" + (window.location.search || "");
  </script>
</body>
</html>
